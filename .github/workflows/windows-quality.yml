name: Windows quality gate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-2022
    timeout-minutes: 30
    env:
      CI: "true"
      PYTHONUTF8: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run static checks
        run: npm run check

      - name: Run unit tests
        run: npm test

      - name: Run browser end-to-end tests
        run: npm run e2e

      - name: Run real desktop smoke test
        run: npm run desktop:smoke

      - name: Upload end-to-end artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-artifacts
          path: |
            playwright-report/
            test-results/
            artifacts/
          if-no-files-found: ignore
          retention-days: 14
